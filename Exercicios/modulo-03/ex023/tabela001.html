<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style1.css">
    <title>Tabelas</title>
</head>
<body>
    <h1>Primeira tabela</h1>
    <!--
        *-Hierarquia de tabelas simples
        table -> tabela
            table row (tr) linhas da tabela
            table data (td) dado de tabela
    --> 

    <table> <!--Primeira linhas-->
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr><!--Segunda linhas-->
            <td class="num">A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr><!--Terceira linha-->
            <td>A3</td>
            <td class="num">B3</td>
            <td>C3</td>
        </tr>
    </table>
            
</body>
</html>
