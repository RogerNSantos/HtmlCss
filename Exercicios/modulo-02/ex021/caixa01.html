<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>

    <style>
        h1{/*Box level*/
            background-color: beige;
            height: 250px;
            width: 250px;
            border: 10px solid darkgray;
            padding: 20px;
            margin: 10px 15px 50px 30px;
            outline: 10px dashed black;
        }

        a{/*inline-level*/
            border: 10px solid burlywood;
            padding: 25px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos també, são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
